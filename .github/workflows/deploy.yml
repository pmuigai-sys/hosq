name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-edge-functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for func in send-sms keep-alive auto-emergency-triage sms-health; do
            supabase functions deploy "$func" --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
          done

      - name: Set edge function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets set \
            BULKSMS_TOKEN_ID="${{ secrets.BULKSMS_TOKEN_ID }}" \
            BULKSMS_TOKEN_SECRET="${{ secrets.BULKSMS_TOKEN_SECRET }}" \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_INSTANT_APP_ID: ${{ secrets.VITE_INSTANT_APP_ID }}
          VITE_BULKSMS_TOKEN_ID: ${{ secrets.VITE_BULKSMS_TOKEN_ID }}
          VITE_BULKSMS_TOKEN_SECRET: ${{ secrets.VITE_BULKSMS_TOKEN_SECRET }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
