name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 0 */6 * *' # Every 6 days
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send Heartbeat
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "Missing required secrets: SUPABASE_URL and/or SUPABASE_ANON_KEY"
            exit 1
          fi

          response=$(curl -sS --fail-with-body \
            --retry 3 \
            --retry-delay 5 \
            --connect-timeout 15 \
            --max-time 60 \
            -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/keep-alive" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}')

          echo "Keep-alive response: $response"
